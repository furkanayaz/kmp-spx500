ktor {
  application {
    modules = [org.ayaz.finance.presentation.ApplicationKt.module]
  }

  development = true

  deployment {
    host = ${?host}
    port = ${?port}
  }

  redis {
    host = ${?rHost}
    post = ${?rPost}
  }

  jwt {
    secretKey = ${?secretKey}
    issuer = ${?issuer}
    audience = ${?audience}
  }
}