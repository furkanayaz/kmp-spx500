ktor {
  application {
    modules = [org.ayaz.spx500.presentation.ApplicationKt.module]
  }

  development = true

  deployment {
    port = 8080
    port = ${?port}

    env = DEV
    env = ${?env}
  }

  jwt {
    secretKey = ${?secretKey}
    issuer = ${?issuer}
    audience = ${?audience}
  }
}